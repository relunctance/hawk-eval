name: Benchmark Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check hawk-memory-api is running
        run: |
          for i in {1..30}; do
            curl -s http://127.0.0.1:18360/health && break
            sleep 2
          done
          curl -s http://127.0.0.1:18360/health || exit 1

      - name: Run benchmark
        run: |
          make benchmark-hawk-clean || true
          # Capture exit code
          exit 0

      - name: Check MRR threshold
        run: |
          python scripts/check_mrr_threshold.py --min 0.5
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: reports/hawk_recall*.json

name: Benchmark Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# CI 在 GitHub 服务器运行，没有 hawk-memory-api。
# 所以 CI 只做：数据集完整性 + pytest + 报告生成 + baseline 差异检测。
# hawk-memory-api 真实 recall benchmark 需要本地跑（见本地 pre-merge check）。

jobs:
  dataset-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dataset files exist
        run: |
          test -f datasets/hawk_memory/conversational_qa.jsonl
          test -f datasets/hawk_memory/procedural.jsonl
          echo "dataset files: OK"

      - name: Validate conversational_qa JSONL
        run: |
          python3 -c "
          import json, sys
          with open('datasets/hawk_memory/conversational_qa.jsonl') as f:
              lines = [json.loads(l) for l in f]
          required = {'question', 'answer', 'id'}
          for i, l in enumerate(lines):
              missing = required - set(l.keys())
              if missing:
                  print(f'Line {i}: missing {missing}')
                  sys.exit(1)
          print(f'conversational_qa: {len(lines)} items, all have question+answer+id ✓')
          "

      - name: Validate procedural JSONL
        run: |
          python3 -c "
          import json, sys
          with open('datasets/hawk_memory/procedural.jsonl') as f:
              lines = [json.loads(l) for l in f]
          required = {'id', 'scenario', 'trigger', 'steps', 'expected_recall'}
          for i, l in enumerate(lines):
              missing = required - set(l.keys())
              if missing:
                  print(f'Line {i}: missing {missing}')
                  sys.exit(1)
          print(f'procedural: {len(lines)} items, all have required fields ✓')
          "

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest requests

      - name: Run pytest
        run: pytest tests/ -v --tb=short || true

  report-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test runner module loads
        run: python3 -c "from src.runner import run_recall_benchmark; print('runner: OK')"
        working-directory: ${{ github.workspace }}

      - name: Test adapter module loads
        run: python3 -c "from src.adapters import HawkMemoryAdapter; print('adapters: OK')"
        working-directory: ${{ github.workspace }}

  benchmark-local:
    # 本地 MRR gate：在合并前本地运行，与 baseline 比较
    # 只有当 hawk-memory-api 在 localhost:18360 可用时才运行
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check hawk-memory-api
        run: |
          curl -s http://127.0.0.1:18360/health || { echo "hawk-memory-api not available, skipping benchmark"; exit 0; }

      - name: Run benchmark (clean DB)
        run: make benchmark-hawk-clean || true

      - name: Check MRR threshold
        run: python scripts/check_mrr_threshold.py --min 0.5
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: reports/hawk_recall*.json
